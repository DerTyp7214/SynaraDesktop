name: Build and Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build Distributions
        run: ./gradlew :app:packageDistributionForCurrentOS :classic:packageDistributionForCurrentOS

      - name: Build Linux Tarball
        if: matrix.os == 'ubuntu-latest'
        run: |
          ./gradlew :app:createDistributable :classic:createDistributable
          # For Synara (app)
          cd app/build/compose/binaries/main/app
          tar -czf ../../../../../Synara-linux-x64.tar.gz Synara
          cd ../../../../../
          # For Synara (classic)
          cd classic/build/compose/binaries/main/app
          tar -czf ../../../../../ClassicApp-linux-x64.tar.gz Synara
          cd ../../../../../

      - name: Collect Artifacts
        shell: bash
        run: |
          mkdir artifacts
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp app/build/compose/binaries/main/msi/*.msi artifacts/Synara-windows-x64.msi || true
            cp classic/build/compose/binaries/main/msi/*.msi artifacts/ClassicApp-windows-x64.msi || true
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            cp app/build/compose/binaries/main/dmg/*.dmg artifacts/Synara-macos-x64.dmg || true
            cp classic/build/compose/binaries/main/dmg/*.dmg artifacts/ClassicApp-macos-x64.dmg || true
          elif [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            cp app/build/compose/binaries/main/deb/*.deb artifacts/Synara-linux-x64.deb || true
            cp classic/build/compose/binaries/main/deb/*.deb artifacts/ClassicApp-linux-x64.deb || true
            if [ -f Synara-linux-x64.tar.gz ]; then mv Synara-linux-x64.tar.gz artifacts/; fi
            if [ -f ClassicApp-linux-x64.tar.gz ]; then mv ClassicApp-linux-x64.tar.gz artifacts/; fi
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-${{ matrix.os }}
          path: artifacts/
          retention-days: 1

  release:
    name: Create/Update Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: all-artifacts
          merge-multiple: true

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-dev
          name: Latest Development Build
          body: |
            Automated build from the latest commit on `main`.
            
            This release is updated on every push to the `main` branch.
          prerelease: true
          files: |
            all-artifacts/Synara-windows-x64.msi
            all-artifacts/ClassicApp-windows-x64.msi
            all-artifacts/Synara-macos-x64.dmg
            all-artifacts/ClassicApp-macos-x64.dmg
            all-artifacts/Synara-linux-x64.deb
            all-artifacts/ClassicApp-linux-x64.deb
            all-artifacts/Synara-linux-x64.tar.gz
            all-artifacts/ClassicApp-linux-x64.tar.gz
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
