name: Build and Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: true

jobs:
  build:
    name: Build for ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Install ImageMagick
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            sudo apt-get update
            sudo apt-get install -y imagemagick
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            brew install imagemagick
          elif [ "${{ matrix.os }}" = "windows-latest" ]; then
            choco install imagemagick.app
          fi

      - name: Build Distributions
        run: ./gradlew :app:packageDistributionForCurrentOS :classic:packageDistributionForCurrentOS

      - name: Build Linux Tarballs and Arch Packages
        if: matrix.os == 'ubuntu-latest'
        run: |
          ./gradlew :app:createDistributable :classic:createDistributable
          
          VERSION=$(./gradlew :synara:properties -q | grep "^version:" | cut -d' ' -f2 | tr -d '\r')
          [ -z "$VERSION" ] && VERSION="1.0.0"
          
          ARCH_VERSION=$(echo "$VERSION" | tr '-' '_')
          
          # For Synara (app)
          cd app/build/compose/binaries/main/app
          tar -czf ../../../../../../Synara-linux-x64.tar.gz Synara
          
          mkdir -p ../../../../../../arch-app/opt/synara
          mkdir -p ../../../../../../arch-app/usr/share/applications
          mkdir -p ../../../../../../arch-app/usr/share/icons/hicolor/scalable/apps
          mkdir -p ../../../../../../arch-app/usr/share/pixmaps
          
          cp -r Synara/* ../../../../../../arch-app/opt/synara/
          cp ../../../../../../synara/src/commonMain/resources/icon.svg ../../../../../../arch-app/usr/share/icons/hicolor/scalable/apps/synara.svg
          cp ../../../../../../synara/src/commonMain/resources/icon.png ../../../../../../arch-app/usr/share/pixmaps/synara.png
          
          for size in 16 24 32 48 64 96 128 256 512 1024; do
            mkdir -p ../../../../../../arch-app/usr/share/icons/hicolor/${size}x${size}/apps
            convert ../../../../../../synara/src/commonMain/resources/icon.png -resize ${size}x${size} ../../../../../../arch-app/usr/share/icons/hicolor/${size}x${size}/apps/synara.png
          done
          
          cat <<EOF > ../../../../../../arch-app/usr/share/applications/synara.desktop
          [Desktop Entry]
          Name=Synara
          Comment=Synara Music Player
          Exec=/opt/synara/bin/Synara
          Icon=synara
          Terminal=false
          Type=Application
          Categories=Audio;Music;Player;
          EOF

          # Add .INSTALL script for post-install triggers
          cat <<EOF > ../../../../../../arch-app/.INSTALL
          post_install() {
            update-desktop-database -q
            gtk-update-icon-cache -q -t -f usr/share/icons/hicolor
          }
          post_upgrade() {
            post_install
          }
          post_remove() {
            post_install
          }
          EOF

          SIZE=$(du -sb ../../../../../../arch-app | cut -f1)
          cat <<EOF > ../../../../../../arch-app/.PKGINFO
          pkgname = synara
          pkgver = $ARCH_VERSION-1
          pkgdesc = Synara Music Player
          arch = x86_64
          url = https://github.com/${{ github.repository }}
          license = custom
          builddate = $(date +%s)
          packager = GitHub Actions
          size = $SIZE
          install = .INSTALL
          EOF
          cd ../../../../../../arch-app
          tar --zstd -cf ../Synara-linux-x64.pkg.tar.zst .PKGINFO .INSTALL opt usr
          cd ..

          # For Synara (classic)
          cd classic/build/compose/binaries/main/app
          tar -czf ../../../../../../ClassicApp-linux-x64.tar.gz Synara
          
          mkdir -p ../../../../../../arch-classic/opt/synara-classic
          mkdir -p ../../../../../../arch-classic/usr/share/applications
          mkdir -p ../../../../../../arch-classic/usr/share/icons/hicolor/scalable/apps
          mkdir -p ../../../../../../arch-classic/usr/share/pixmaps
          
          cp -r Synara/* ../../../../../../arch-classic/opt/synara-classic/
          cp ../../../../../../synara/src/commonMain/resources/icon.svg ../../../../../../arch-classic/usr/share/icons/hicolor/scalable/apps/synara-classic.svg
          cp ../../../../../../synara/src/commonMain/resources/icon.png ../../../../../../arch-classic/usr/share/pixmaps/synara-classic.png
          
          for size in 16 24 32 48 64 96 128 256 512 1024; do
            mkdir -p ../../../../../../arch-classic/usr/share/icons/hicolor/${size}x${size}/apps
            convert ../../../../../../synara/src/commonMain/resources/icon.png -resize ${size}x${size} ../../../../../../arch-classic/usr/share/icons/hicolor/${size}x${size}/apps/synara-classic.png
          done
          
          cat <<EOF > ../../../../../../arch-classic/usr/share/applications/synara-classic.desktop
          [Desktop Entry]
          Name=Synara (Classic)
          Comment=Synara Music Player (Classic)
          Exec=/opt/synara-classic/bin/Synara
          Icon=synara-classic
          Terminal=false
          Type=Application
          Categories=Audio;Music;Player;
          EOF

          # Add .INSTALL script for classic
          cat <<EOF > ../../../../../../arch-classic/.INSTALL
          post_install() {
            update-desktop-database -q
            gtk-update-icon-cache -q -t -f usr/share/icons/hicolor
          }
          post_upgrade() {
            post_install
          }
          post_remove() {
            post_install
          }
          EOF

          SIZE=$(du -sb ../../../../../../arch-classic | cut -f1)
          cat <<EOF > ../../../../../../arch-classic/.PKGINFO
          pkgname = synara-classic
          pkgver = $ARCH_VERSION-1

          pkgdesc = Synara Music Player (Classic)
          arch = x86_64
          url = https://github.com/${{ github.repository }}
          license = custom
          builddate = $(date +%s)
          packager = GitHub Actions
          size = $SIZE
          install = .INSTALL
          EOF
          cd ../../../../../../arch-classic
          tar --zstd -cf ../ClassicApp-linux-x64.pkg.tar.zst .PKGINFO .INSTALL opt usr
          cd ..

      - name: Collect Artifacts
        shell: bash
        run: |
          mkdir artifacts
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp app/build/compose/binaries/main/msi/*.msi artifacts/Synara-windows-x64.msi || true
            cp classic/build/compose/binaries/main/msi/*.msi artifacts/ClassicApp-windows-x64.msi || true
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            cp app/build/compose/binaries/main/dmg/*.dmg artifacts/Synara-macos-x64.dmg || true
            cp classic/build/compose/binaries/main/dmg/*.dmg artifacts/ClassicApp-macos-x64.dmg || true
          elif [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            cp app/build/compose/binaries/main/deb/*.deb artifacts/Synara-linux-x64.deb || true
            cp classic/build/compose/binaries/main/deb/*.deb artifacts/ClassicApp-linux-x64.deb || true
            if [ -f Synara-linux-x64.tar.gz ]; then mv Synara-linux-x64.tar.gz artifacts/; fi
            if [ -f ClassicApp-linux-x64.tar.gz ]; then mv ClassicApp-linux-x64.tar.gz artifacts/; fi
            if [ -f Synara-linux-x64.pkg.tar.zst ]; then mv Synara-linux-x64.pkg.tar.zst artifacts/; fi
            if [ -f ClassicApp-linux-x64.pkg.tar.zst ]; then mv ClassicApp-linux-x64.pkg.tar.zst artifacts/; fi
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-${{ matrix.os }}
          path: artifacts/
          retention-days: 1

  release:
    name: Create/Update Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: all-artifacts
          merge-multiple: true

      - name: Create Arch Linux Repository Database
        run: |
          cd all-artifacts
          docker run --rm -v $(pwd):/repo archlinux:base bash -c "cd /repo && repo-add synara.db.tar.gz *.pkg.tar.zst"
          
          rm -f synara.db synara.files
          cp synara.db.tar.gz synara.db
          cp synara.files.tar.gz synara.files

          cat <<EOF > synara.conf
          [synara]
          SigLevel = Optional TrustAll
          Server = https://github.com/${{ github.repository }}/releases/download/latest-dev
          EOF

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-dev
          name: Latest Development Build
          body: |
            Automated build from the latest commit on `master`.
            
            This release is updated on every push to the `master` branch.
            
            ### Arch Linux Repository
            To use this release as a pacman repository, add the following to your `/etc/pacman.conf`:
            ```ini
            [synara]
            SigLevel = Optional TrustAll
            Server = https://github.com/${{ github.repository }}/releases/download/latest-dev
            ```
            Alternatively, download `synara.conf` and use `Include = /path/to/synara.conf`.
          prerelease: true
          files: |
            all-artifacts/Synara-windows-x64.msi
            all-artifacts/ClassicApp-windows-x64.msi
            all-artifacts/Synara-macos-x64.dmg
            all-artifacts/ClassicApp-macos-x64.dmg
            all-artifacts/Synara-linux-x64.deb
            all-artifacts/ClassicApp-linux-x64.deb
            all-artifacts/Synara-linux-x64.tar.gz
            all-artifacts/ClassicApp-linux-x64.tar.gz
            all-artifacts/Synara-linux-x64.pkg.tar.zst
            all-artifacts/ClassicApp-linux-x64.pkg.tar.zst
            all-artifacts/synara.db
            all-artifacts/synara.db.tar.gz
            all-artifacts/synara.files
            all-artifacts/synara.files.tar.gz
            all-artifacts/synara.conf
          generate_release_notes: true
          make_latest: true
          token: ${{ secrets.GITHUB_TOKEN }}
