name: Build and Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: true

jobs:
  build:
    name: Build for ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build Distributions
        run: ./gradlew :app:packageDistributionForCurrentOS :classic:packageDistributionForCurrentOS

      - name: Build Linux Tarballs and Arch Packages
        if: matrix.os == 'ubuntu-latest'
        run: |
          ./gradlew :app:createDistributable :classic:createDistributable
          
          # Get version (removing prerelease info for Arch compatibility)
          VERSION=$(./gradlew :synara:properties -q | grep "^version:" | cut -d' ' -f2 | cut -d'-' -f1)
          
          # For Synara (app)
          cd app/build/compose/binaries/main/app
          tar -czf ../../../../../../Synara-linux-x64.tar.gz Synara
          
          # Prepare Arch Linux Package for Synara (app)
          mkdir -p ../../../../../../arch-app/opt/synara
          cp -r Synara/* ../../../../../../arch-app/opt/synara/
          # Create a simple PKGBUILD-like PKGINFO
          cat <<EOF > ../../../../../../arch-app/.PKGINFO
          pkgname = synara
          pkgver = $VERSION
          pkgrel = 1
          pkgdesc = Synara Music Player
          arch = x86_64
          license = custom
          EOF
          cd ../../../../../../arch-app
          tar --zstd -cf ../Synara-linux-x64.pkg.tar.zst .
          cd ..

          # For Synara (classic)
          cd classic/build/compose/binaries/main/app
          tar -czf ../../../../../../ClassicApp-linux-x64.tar.gz Synara
          
          # Prepare Arch Linux Package for Synara (classic)
          mkdir -p ../../../../../../arch-classic/opt/synara-classic
          cp -r Synara/* ../../../../../../arch-classic/opt/synara-classic/
          cat <<EOF > ../../../../../../arch-classic/.PKGINFO
          pkgname = synara-classic
          pkgver = $VERSION
          pkgrel = 1
          pkgdesc = Synara Music Player (Classic)
          arch = x86_64
          license = custom
          EOF
          cd ../../../../../../arch-classic
          tar --zstd -cf ../ClassicApp-linux-x64.pkg.tar.zst .
          cd ..

      - name: Collect Artifacts
        shell: bash
        run: |
          mkdir artifacts
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp app/build/compose/binaries/main/msi/*.msi artifacts/Synara-windows-x64.msi || true
            cp classic/build/compose/binaries/main/msi/*.msi artifacts/ClassicApp-windows-x64.msi || true
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            cp app/build/compose/binaries/main/dmg/*.dmg artifacts/Synara-macos-x64.dmg || true
            cp classic/build/compose/binaries/main/dmg/*.dmg artifacts/ClassicApp-macos-x64.dmg || true
          elif [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            cp app/build/compose/binaries/main/deb/*.deb artifacts/Synara-linux-x64.deb || true
            cp classic/build/compose/binaries/main/deb/*.deb artifacts/ClassicApp-linux-x64.deb || true
            if [ -f Synara-linux-x64.tar.gz ]; then mv Synara-linux-x64.tar.gz artifacts/; fi
            if [ -f ClassicApp-linux-x64.tar.gz ]; then mv ClassicApp-linux-x64.tar.gz artifacts/; fi
            if [ -f Synara-linux-x64.pkg.tar.zst ]; then mv Synara-linux-x64.pkg.tar.zst artifacts/; fi
            if [ -f ClassicApp-linux-x64.pkg.tar.zst ]; then mv ClassicApp-linux-x64.pkg.tar.zst artifacts/; fi
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-${{ matrix.os }}
          path: artifacts/
          retention-days: 1

  release:
    name: Create/Update Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: all-artifacts
          merge-multiple: true

      - name: Create Arch Linux Repository Database
        run: |
          cd all-artifacts
          # Use Arch Linux container to run repo-add
          docker run --rm -v $(pwd):/repo archlinux:base bash -c "cd /repo && repo-add synara.db.tar.gz *.pkg.tar.zst"
          
          # Copy to non-extension versions for pacman
          cp synara.db.tar.gz synara.db
          cp synara.files.tar.gz synara.files

          # Create a helper .conf file for pacman
          cat <<EOF > synara.conf
          [synara]
          SigLevel = Optional TrustAll
          Server = https://github.com/${{ github.repository }}/releases/download/latest-dev
          EOF

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-dev
          name: Latest Development Build
          body: |
            Automated build from the latest commit on `main`.
            
            This release is updated on every push to the `main` branch.
            
            ### Arch Linux Repository
            To use this release as a pacman repository, add the following to your `/etc/pacman.conf`:
            ```ini
            [synara]
            SigLevel = Optional TrustAll
            Server = https://github.com/${{ github.repository }}/releases/download/latest-dev
            ```
            Alternatively, download `synara.conf` and use `Include = /path/to/synara.conf`.
          prerelease: true
          files: |
            all-artifacts/Synara-windows-x64.msi
            all-artifacts/ClassicApp-windows-x64.msi
            all-artifacts/Synara-macos-x64.dmg
            all-artifacts/ClassicApp-macos-x64.dmg
            all-artifacts/Synara-linux-x64.deb
            all-artifacts/ClassicApp-linux-x64.deb
            all-artifacts/Synara-linux-x64.tar.gz
            all-artifacts/ClassicApp-linux-x64.tar.gz
            all-artifacts/Synara-linux-x64.pkg.tar.zst
            all-artifacts/ClassicApp-linux-x64.pkg.tar.zst
            all-artifacts/synara.db
            all-artifacts/synara.db.tar.gz
            all-artifacts/synara.files
            all-artifacts/synara.files.tar.gz
            all-artifacts/synara.conf
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
